<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 0 1200 1200" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef0f3"/>
      <stop offset="0.5" stop-color="#d3d8df"/>
      <stop offset="1" stop-color="#b9c0ca"/>
    </linearGradient>
    <linearGradient id="steelDoor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6e9ee"/>
      <stop offset="1" stop-color="#c6ccd5"/>
    </linearGradient>
    <linearGradient id="goldRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E09F3E"/>
      <stop offset="1" stop-color="#c9882a"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1C1C1C" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="-150" width="1200" height="1200" fill="#FAF7F2"/>
  <circle cx="820" cy="140" r="220" fill="#E09F3E" opacity="0.08"/>
  <circle cx="60" cy="1020" r="260" fill="#3D5A80" opacity="0.07"/>
  <circle cx="140" cy="240" r="8" fill="#E09F3E" opacity="0.5"/>
  <circle cx="800" cy="900" r="10" fill="#3D5A80" opacity="0.35"/>

  <text x="450" y="112" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" letter-spacing="6">
    <tspan fill="#1C1C1C">CALOR </tspan><tspan fill="#E09F3E">MEGA</tspan>
  </text>
  <text x="450" y="156" text-anchor="middle" font-size="19" letter-spacing="5" fill="#3D5A80" font-weight="bold">PREMIUM INDUSTRIAL FOOD DRYER</text>
  <rect x="390" y="176" width="120" height="4" rx="2" fill="#E09F3E"/>

  <!-- machine -->
  <g filter="url(#soft)">
    <rect x="235" y="270" width="430" height="620" rx="20" fill="url(#steel)" stroke="#a9b1bd" stroke-width="2"/>
    <!-- left door -->
    <rect x="255" y="292" width="170" height="560" rx="10" fill="url(#steelDoor)" stroke="#aeb6c1" stroke-width="1.5"/>
    <!-- right door -->
    <rect x="475" y="292" width="170" height="560" rx="10" fill="url(#steelDoor)" stroke="#aeb6c1" stroke-width="1.5"/>
    <!-- brushed lines -->
    <g stroke="#c6ccd5" stroke-width="1" opacity="0.7">
      <line x1="270" y1="310" x2="270" y2="835"/><line x1="300" y1="310" x2="300" y2="835"/>
      <line x1="330" y1="310" x2="330" y2="835"/><line x1="360" y1="310" x2="360" y2="835"/>
      <line x1="390" y1="310" x2="390" y2="835"/><line x1="540" y1="310" x2="540" y2="835"/>
      <line x1="570" y1="310" x2="570" y2="835"/><line x1="600" y1="310" x2="600" y2="835"/>
      <line x1="630" y1="310" x2="630" y2="835"/><line x1="510" y1="310" x2="510" y2="835"/>
    </g>
    <!-- handles -->
    <rect x="408" y="470" width="12" height="120" rx="6" fill="#8f97a3"/>
    <rect x="480" y="470" width="12" height="120" rx="6" fill="#8f97a3"/>
    <!-- control column -->
    <rect x="430" y="270" width="40" height="620" fill="#2e3947"/>
    <rect x="436" y="300" width="28" height="52" rx="4" fill="#101820"/>
    <text x="450" y="322" text-anchor="middle" font-size="12" fill="#5df08a" font-family="'Courier New', monospace" font-weight="bold">65.0</text>
    <text x="450" y="340" text-anchor="middle" font-size="10" fill="#5df08a" font-family="'Courier New', monospace">°C</text>
    <circle cx="450" cy="380" r="7" fill="#E09F3E"/>
    <circle cx="450" cy="430" r="16" fill="#e8eaee" stroke="#8f97a3" stroke-width="2"/>
    <line x1="450" y1="430" x2="458" y2="420" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="450" cy="490" r="16" fill="#e8eaee" stroke="#8f97a3" stroke-width="2"/>
    <line x1="450" y1="490" x2="442" y2="480" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#4a5665" stroke-width="3" stroke-linecap="round">
      <line x1="440" y1="830" x2="460" y2="830"/><line x1="440" y1="842" x2="460" y2="842"/><line x1="440" y1="854" x2="460" y2="854"/>
    </g>
    <!-- feet -->
    <rect x="260" y="890" width="26" height="20" rx="4" fill="#5a6473"/>
    <rect x="614" y="890" width="26" height="20" rx="4" fill="#5a6473"/>
  </g>

  <!-- callout lines -->
  <g stroke="#3D5A80" stroke-width="1.5" opacity="0.55">
    <path d="M212 400 L300 430" fill="none"/>
    <path d="M212 700 L300 660" fill="none"/>
    <path d="M688 480 L600 510" fill="none"/>
    <path d="M688 780 L600 730" fill="none"/>
  </g>
  <g fill="#3D5A80" opacity="0.7">
    <circle cx="300" cy="430" r="4"/><circle cx="300" cy="660" r="4"/>
    <circle cx="600" cy="510" r="4"/><circle cx="600" cy="730" r="4"/>
  </g>

  <!-- chips left -->
  <g filter="url(#soft)">
    <rect x="16" y="336" width="200" height="88" rx="18" fill="#FFFFFF"/>
    <circle cx="56" cy="380" r="22" fill="#3D5A80" opacity="0.12"/>
    <line x1="56" y1="370" x2="56" y2="386" stroke="#3D5A80" stroke-width="4" stroke-linecap="round"/>
    <circle cx="56" cy="390" r="6" fill="#3D5A80"/>
    <text x="92" y="376" font-size="16" font-weight="bold" fill="#1C1C1C">±1°C Digital</text>
    <text x="92" y="398" font-size="14" fill="#6b6b6b">Temperature Control</text>
  </g>
  <g filter="url(#soft)">
    <rect x="16" y="636" width="200" height="88" rx="18" fill="#FFFFFF"/>
    <circle cx="56" cy="680" r="22" fill="#E09F3E" opacity="0.15"/>
    <path d="M56 664 C48 676 46 682 46 687 a10 10 0 0 0 20 0 c0 -5 -2 -11 -10 -23 Z" fill="#E09F3E"/>
    <text x="92" y="676" font-size="16" font-weight="bold" fill="#1C1C1C">Smart Humidity</text>
    <text x="92" y="698" font-size="14" fill="#6b6b6b">Locks in Nutrients</text>
  </g>

  <!-- chips right -->
  <g filter="url(#soft)">
    <rect x="684" y="416" width="200" height="88" rx="18" fill="#FFFFFF"/>
    <circle cx="724" cy="460" r="22" fill="#3FA34D" opacity="0.15"/>
    <polygon points="728,444 714,464 723,464 719,476 734,456 725,456" fill="#3FA34D"/>
    <text x="756" y="456" font-size="16" font-weight="bold" fill="#1C1C1C">40% Less</text>
    <text x="756" y="478" font-size="14" fill="#6b6b6b">Energy Use</text>
  </g>
  <g filter="url(#soft)">
    <rect x="684" y="716" width="200" height="88" rx="18" fill="#FFFFFF"/>
    <circle cx="724" cy="760" r="22" fill="#3D5A80" opacity="0.12"/>
    <rect x="712" y="750" width="24" height="17" rx="3" fill="none" stroke="#3D5A80" stroke-width="3"/>
    <line x1="712" y1="756" x2="736" y2="756" stroke="#3D5A80" stroke-width="3"/>
    <text x="756" y="756" font-size="16" font-weight="bold" fill="#1C1C1C">Food Grade</text>
    <text x="756" y="778" font-size="14" fill="#6b6b6b">Aluminium Body</text>
  </g>

  <!-- bottom ribbon -->
  <g filter="url(#soft)">
    <rect x="120" y="1010" width="660" height="76" rx="38" fill="url(#goldRibbon)"/>
    <text x="450" y="1043" text-anchor="middle" font-size="19" font-weight="bold" fill="#FFFFFF" letter-spacing="1">PRESERVE FRESHNESS  •  INCREASE PROFIT</text>
    <text x="450" y="1068" text-anchor="middle" font-size="15" fill="#FFF6E8" letter-spacing="2">REDUCE FOOD WASTE</text>
  </g>
</svg>
