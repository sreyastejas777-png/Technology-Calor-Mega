<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 0 1200 1200" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="frame2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9ebef"/>
      <stop offset="1" stop-color="#c3c9d2"/>
    </linearGradient>
    <linearGradient id="cavity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3644"/>
      <stop offset="1" stop-color="#1a222d"/>
    </linearGradient>
    <filter id="soft2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1C1C1C" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#E09F3E"/>
    </marker>
  </defs>

  <rect x="-150" width="1200" height="1200" fill="#FAF7F2"/>
  <circle cx="90" cy="150" r="200" fill="#3D5A80" opacity="0.07"/>
  <circle cx="830" cy="1060" r="230" fill="#E09F3E" opacity="0.08"/>

  <text x="450" y="104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="#1C1C1C" letter-spacing="3">UNIFORM DRYING</text>
  <text x="450" y="148" text-anchor="middle" font-size="19" letter-spacing="5" fill="#3D5A80" font-weight="bold">EVERY TRAY. EVERY TIME.</text>
  <rect x="390" y="168" width="120" height="4" rx="2" fill="#E09F3E"/>

  <!-- cabinet -->
  <g filter="url(#soft2)">
    <rect x="180" y="230" width="540" height="740" rx="20" fill="url(#frame2)" stroke="#a9b1bd" stroke-width="2"/>
    <rect x="210" y="260" width="480" height="640" rx="10" fill="url(#cavity)"/>
    <!-- interior side rails -->
    <rect x="210" y="260" width="14" height="640" fill="#3a4757"/>
    <rect x="676" y="260" width="14" height="640" fill="#3a4757"/>

    <!-- trays -->
    <!-- tray 1: mango -->
    <g>
      <rect x="232" y="300" width="436" height="10" rx="4" fill="#8f97a3"/>
      <line x1="252" y1="305" x2="648" y2="305" stroke="#6b7482" stroke-width="2" stroke-dasharray="6 6"/>
      <ellipse cx="300" cy="288" rx="26" ry="13" fill="#F6BE4F"/><ellipse cx="360" cy="288" rx="26" ry="13" fill="#F2B03C"/>
      <ellipse cx="420" cy="288" rx="26" ry="13" fill="#F6BE4F"/><ellipse cx="480" cy="288" rx="26" ry="13" fill="#F2B03C"/>
      <ellipse cx="540" cy="288" rx="26" ry="13" fill="#F6BE4F"/><ellipse cx="600" cy="288" rx="26" ry="13" fill="#F2B03C"/>
    </g>
    <!-- tray 2: banana chips -->
    <g>
      <rect x="232" y="400" width="436" height="10" rx="4" fill="#8f97a3"/>
      <line x1="252" y1="405" x2="648" y2="405" stroke="#6b7482" stroke-width="2" stroke-dasharray="6 6"/>
      <g fill="#F2D399" stroke="#DDB96F" stroke-width="2">
        <circle cx="295" cy="386" r="15"/><circle cx="345" cy="386" r="15"/><circle cx="395" cy="386" r="15"/>
        <circle cx="445" cy="386" r="15"/><circle cx="495" cy="386" r="15"/><circle cx="545" cy="386" r="15"/><circle cx="598" cy="386" r="15"/>
      </g>
    </g>
    <!-- tray 3: jackfruit -->
    <g>
      <rect x="232" y="500" width="436" height="10" rx="4" fill="#8f97a3"/>
      <line x1="252" y1="505" x2="648" y2="505" stroke="#6b7482" stroke-width="2" stroke-dasharray="6 6"/>
      <g fill="#E09F3E">
        <path d="M290 498 q14 -30 28 0 Z"/><path d="M350 498 q14 -30 28 0 Z"/><path d="M410 498 q14 -30 28 0 Z"/>
        <path d="M470 498 q14 -30 28 0 Z"/><path d="M530 498 q14 -30 28 0 Z"/><path d="M590 498 q14 -30 28 0 Z"/>
      </g>
    </g>
    <!-- tray 4: tomato rings -->
    <g>
      <rect x="232" y="600" width="436" height="10" rx="4" fill="#8f97a3"/>
      <line x1="252" y1="605" x2="648" y2="605" stroke="#6b7482" stroke-width="2" stroke-dasharray="6 6"/>
      <g fill="#E2574C">
        <circle cx="300" cy="586" r="16"/><circle cx="355" cy="586" r="16"/><circle cx="410" cy="586" r="16"/>
        <circle cx="465" cy="586" r="16"/><circle cx="520" cy="586" r="16"/><circle cx="575" cy="586" r="16"/><circle cx="625" cy="586" r="16"/>
      </g>
      <g fill="#F4A197">
        <circle cx="300" cy="586" r="8"/><circle cx="355" cy="586" r="8"/><circle cx="410" cy="586" r="8"/>
        <circle cx="465" cy="586" r="8"/><circle cx="520" cy="586" r="8"/><circle cx="575" cy="586" r="8"/><circle cx="625" cy="586" r="8"/>
      </g>
    </g>
    <!-- tray 5: herbs -->
    <g>
      <rect x="232" y="700" width="436" height="10" rx="4" fill="#8f97a3"/>
      <line x1="252" y1="705" x2="648" y2="705" stroke="#6b7482" stroke-width="2" stroke-dasharray="6 6"/>
      <g stroke="#3FA34D" stroke-width="4" stroke-linecap="round">
        <path d="M290 698 q10 -26 20 0" fill="none"/><path d="M350 698 q10 -26 20 0" fill="none"/>
        <path d="M410 698 q10 -26 20 0" fill="none"/><path d="M470 698 q10 -26 20 0" fill="none"/>
        <path d="M530 698 q10 -26 20 0" fill="none"/><path d="M590 698 q10 -26 20 0" fill="none"/>
      </g>
      <g fill="#57B96A">
        <circle cx="300" cy="676" r="5"/><circle cx="360" cy="676" r="5"/><circle cx="420" cy="676" r="5"/>
        <circle cx="480" cy="676" r="5"/><circle cx="540" cy="676" r="5"/><circle cx="600" cy="676" r="5"/>
      </g>
    </g>
    <!-- tray 6: coconut -->
    <g>
      <rect x="232" y="800" width="436" height="10" rx="4" fill="#8f97a3"/>
      <line x1="252" y1="805" x2="648" y2="805" stroke="#6b7482" stroke-width="2" stroke-dasharray="6 6"/>
      <g fill="#F4EFE8" stroke="#D9CFC0" stroke-width="2">
        <ellipse cx="300" cy="788" rx="22" ry="11"/><ellipse cx="360" cy="788" rx="22" ry="11"/><ellipse cx="420" cy="788" rx="22" ry="11"/>
        <ellipse cx="480" cy="788" rx="22" ry="11"/><ellipse cx="540" cy="788" rx="22" ry="11"/><ellipse cx="600" cy="788" rx="22" ry="11"/>
      </g>
    </g>

    <!-- airflow -->
    <g stroke="#E09F3E" stroke-width="4" fill="none" stroke-dasharray="10 8" opacity="0.9">
      <path d="M245 870 C 235 700 235 460 250 300" marker-end="url(#arrowGold)"/>
      <path d="M655 300 C 668 470 668 710 652 870" marker-end="url(#arrowGold)"/>
    </g>

    <!-- base vents -->
    <g stroke="#8f97a3" stroke-width="4" stroke-linecap="round">
      <line x1="380" y1="935" x2="420" y2="935"/><line x1="440" y1="935" x2="480" y2="935"/><line x1="500" y1="935" x2="520" y2="935"/>
    </g>
    <rect x="205" y="970" width="28" height="20" rx="4" fill="#5a6473"/>
    <rect x="667" y="970" width="28" height="20" rx="4" fill="#5a6473"/>
  </g>

  <!-- bottom stat pills -->
  <g filter="url(#soft2)">
    <rect x="70" y="1040" width="232" height="72" rx="36" fill="#FFFFFF"/>
    <text x="186" y="1071" text-anchor="middle" font-size="22" font-weight="bold" fill="#3D5A80">±1°C</text>
    <text x="186" y="1094" text-anchor="middle" font-size="14" fill="#6b6b6b">Chamber Stability</text>
  </g>
  <g filter="url(#soft2)">
    <rect x="334" y="1040" width="232" height="72" rx="36" fill="#FFFFFF"/>
    <text x="450" y="1071" text-anchor="middle" font-size="22" font-weight="bold" fill="#E09F3E">40%</text>
    <text x="450" y="1094" text-anchor="middle" font-size="14" fill="#6b6b6b">Energy Savings</text>
  </g>
  <g filter="url(#soft2)">
    <rect x="598" y="1040" width="232" height="72" rx="36" fill="#FFFFFF"/>
    <text x="714" y="1071" text-anchor="middle" font-size="22" font-weight="bold" fill="#3FA34D">12 Mo</text>
    <text x="714" y="1094" text-anchor="middle" font-size="14" fill="#6b6b6b">Shelf Life</text>
  </g>
</svg>
